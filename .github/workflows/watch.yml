name: watch-upstream

# Weekly (and on demand): check edf-hpc/verrou for a new commit, resolve the
# Valgrind version its patch targets, and - if either moved - open a bump PR,
# build-test the new pair, and auto-merge it when the build passes.
#
# Jobs: watch (resolve + open PR) -> gate (build-test the bump branch) ->
# merge (squash-merge if green) / report-conflict (label + comment if red).
# The gate runs inside this run because a PR opened with GITHUB_TOKEN does NOT
# trigger build-test on its own - so we call build-test as a reusable workflow.
# x86_64 is the merge gate; aarch64 stays advisory (continue-on-error upstream).
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.r.outputs.changed }}
      new_verrou: ${{ steps.r.outputs.new_verrou }}
      new_valgrind: ${{ steps.r.outputs.new_valgrind }}
      branch: ${{ steps.pr.outputs.branch }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest compatible (verrou, valgrind) pair
        id: r
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source versions.env
          # Cheap infra steps - if these fail it's a real outage, so fail red.
          new_verrou=$(git ls-remote https://github.com/edf-hpc/verrou HEAD | cut -f1 | cut -c1-7)
          git clone --quiet https://github.com/edf-hpc/verrou /tmp/verrou
          git -C /tmp/verrou checkout --quiet "$new_verrou"

          # Resolving the Valgrind version is the fragile part: it fails when
          # Verrou moves/renames the signals it declares its target Valgrind
          # version in. That's a human-resolve situation, not CI breakage - so
          # file a (deduplicated) issue and exit green rather than failing red.
          if ! out=$(python3 resolve_versions.py /tmp/verrou 2>&1); then
            echo "resolve_versions.py failed:"; printf '%s\n' "$out"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            gh label create upstream-watch --color FBCA04 \
              --description "Automated upstream-watch alerts" 2>/dev/null || true
            if [ "$(gh issue list --state open --label upstream-watch --json number --jq 'length')" = "0" ]; then
              body=$(printf '`resolve_versions.py` could not determine the Valgrind version for verrou@%s.\n\nThis usually means edf-hpc/verrou moved or renamed the signals declaring its target Valgrind version (Dockerfile `ARG VALGRIND_VERSION` / README clone instructions / `valgrind.<ver>.diff` filename). Resolve by hand and update `resolve_versions.py`.\n\n```\n%s\n```\n\n_Filed automatically by watch-upstream; it will not open a duplicate while this issue stays open._' "$new_verrou" "$out")
              gh issue create --title "watch-upstream: cannot resolve Valgrind version (upstream layout changed)" \
                --body "$body" --label upstream-watch
            else
              echo "an open upstream-watch issue already tracks this - not duplicating"
            fi
            exit 0
          fi
          new_valgrind=$(printf '%s\n' "$out" | cut -d= -f2)
          echo "current: verrou=$VERROU_COMMIT valgrind=$VALGRIND_VERSION"
          echo "latest : verrou=$new_verrou valgrind=$new_valgrind"
          echo "new_verrou=$new_verrou"   >> "$GITHUB_OUTPUT"
          echo "new_valgrind=$new_valgrind" >> "$GITHUB_OUTPUT"
          if [ "$new_verrou" = "$VERROU_COMMIT" ] && [ "$new_valgrind" = "$VALGRIND_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open/update bump PR
        id: pr
        if: steps.r.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          NV: ${{ steps.r.outputs.new_verrou }}
          NG: ${{ steps.r.outputs.new_valgrind }}
        run: |
          set -euo pipefail
          branch="bump/verrou-${NV}-valgrind-${NG}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git config user.name "verrou-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          sed -i "s/^VALGRIND_VERSION=.*/VALGRIND_VERSION=${NG}/" versions.env
          sed -i "s/^VERROU_COMMIT=.*/VERROU_COMMIT=${NV}/" versions.env
          # a Valgrind bump invalidates any pinned SHA - clear it so it isn't stale
          sed -i "s/^VALGRIND_SHA256=.*/VALGRIND_SHA256=/" versions.env
          git add versions.env
          git commit -m "bump: verrou@${NV} + valgrind ${NG}"
          git push -f origin "$branch"
          body=$'Automated upstream bump.\n\n- Verrou drives the pairing; Valgrind resolved from Verrou\'s Dockerfile/README.\n- **build-test** (this run\'s `gate` job) verifies the patch applies + builds + smoke-tests; x86_64 green => this PR auto-merges, aarch64 is advisory.\n- A failed build instead labels this PR `conflict` and leaves it open for a human.\n- If `VALGRIND_VERSION` changed, re-pin `VALGRIND_SHA256` by hand once merged.'
          gh pr create --base main --head "$branch" \
            --title "bump: verrou@${NV} + valgrind ${NG}" --body "$body" \
            || gh pr edit "$branch" --title "bump: verrou@${NV} + valgrind ${NG}" --body "$body"

  # Build the bump branch's pair as the merge gate. A PR opened with GITHUB_TOKEN
  # doesn't trigger build-test by itself, so we call it here as a reusable
  # workflow. Its conclusion = x86_64's result (aarch64 is continue-on-error).
  gate:
    needs: watch
    if: ${{ needs.watch.outputs.changed == 'true' }}
    # No permissions override: a reusable-workflow caller caps the WHOLE called
    # workflow, and build-test's conflict-label job declares pull-requests/issues
    # write. Capping below that is a startup_failure (validated even though that
    # job is skipped here). Inherit the workflow-level grant, which covers it.
    uses: ./.github/workflows/build-test.yml
    with:
      ref: ${{ needs.watch.outputs.branch }}

  merge:
    needs: [watch, gate]
    if: ${{ needs.watch.outputs.changed == 'true' && needs.gate.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash-merge the bump PR (x86_64 build passed)
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ needs.watch.outputs.branch }}
        run: |
          set -euo pipefail
          gh pr merge "$BRANCH" --repo "$GITHUB_REPOSITORY" --squash --delete-branch

  report-conflict:
    needs: [watch, gate]
    if: ${{ always() && needs.watch.outputs.changed == 'true' && needs.gate.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Flag the bump PR as conflicting (left open for a human)
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ needs.watch.outputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create conflict --color B60205 \
            --description "Bump PR failed build-test" 2>/dev/null || true
          gh pr edit "$BRANCH" --repo "$GITHUB_REPOSITORY" --add-label conflict || true
          gh pr comment "$BRANCH" --repo "$GITHUB_REPOSITORY" \
            --body "Auto-merge blocked: build-test failed for this pair on x86_64 - the patch may not apply, the build broke, or verrou no longer perturbs. See ${RUN_URL}. Left open for a human to resolve." || true
