name: release

# On a version tag (vX): build the pinned pair per platform, package the install
# tree, and publish prebuilt artifacts to a GitHub Release so downstreams (MFC)
# download in seconds instead of a ~20-min build. workflow_dispatch builds without
# publishing (dry run).
#
# Built inside manylinux_2_28 (glibc 2.28) so the artifact runs on RHEL8/9, current
# HPC, and Ubuntu 18.10+ — not just whatever glibc the runner happens to ship. (It's
# also the oldest image whose glibc still satisfies node20, so the JS actions run.)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64,  image: quay.io/pypa/manylinux_2_28_x86_64 }
          - { os: ubuntu-24.04-arm, arch: aarch64, image: quay.io/pypa/manylinux_2_28_aarch64 }
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.image }}
    # aarch64 is experimental for Verrou's FP backends — never let it block the
    # x86_64 release (publish still gets whatever artifacts did build).
    continue-on-error: ${{ matrix.arch == 'aarch64' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        # manylinux is AlmaLinux 8 (gcc-toolset already on PATH). bzip2 for the
        # valgrind .tar.bz2; zstd for packaging; binutils (objdump) for the floor check.
        run: |
          dnf install -y autoconf automake libtool patch make git wget bzip2 zstd binutils
          git config --global --add safe.directory '*'
      - name: Build
        run: bash build.sh --prefix "$PWD/out"
      - name: Package
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source ./versions.env
          name="verrou-${VERROU_COMMIT}-valgrind-${VALGRIND_VERSION}-linux-${{ matrix.arch }}"
          tar -C out -cf - . | zstd -19 -T0 -o "${name}.tar.zst"
          sha256sum "${name}.tar.zst" > "${name}.tar.zst.sha256"
      - name: Verify packaged artifact (relocate + perturb; report glibc floor)
        # Test the tarball we are about to ship, not the in-place build: extract to a
        # fresh path, drive it via env.sh, and confirm verrou still perturbs FP.
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source ./versions.env
          name="verrou-${VERROU_COMMIT}-valgrind-${VALGRIND_VERSION}-linux-${{ matrix.arch }}"
          reloc=/tmp/verrou-reloc; mkdir -p "$reloc"
          zstd -dc "${name}.tar.zst" | tar -C "$reloc" -xf -
          # shellcheck disable=SC1091
          source "$reloc/env.sh"
          valgrind --tool=verrou --version
          echo "glibc floor: $(objdump -T "$reloc/bin/valgrind" | grep -oE 'GLIBC_[0-9.]+' | sort -V | tail -1)"
          gcc -g -O0 test/smoke.c -o /tmp/smoke
          b=$(valgrind --tool=verrou --rounding-mode=nearest /tmp/smoke 2>/dev/null)
          r=$(valgrind --tool=verrou --rounding-mode=random  /tmp/smoke 2>/dev/null)
          echo "nearest=$b random=$r"
          [ "$b" != "$r" ] || { echo "ERROR: random rounding did not change the result — verrou not perturbing"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: verrou-${{ matrix.arch }}
          path: |
            *.tar.zst
            *.tar.zst.sha256

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" --generate-notes
